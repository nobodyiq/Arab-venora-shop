<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر الداينوات</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
}

header{
    background:#1e293b;
    text-align:center;
    padding:20px;
    font-size:30px;
    font-weight:bold;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    background:#1e293b;
    width:300px;
    border-radius:15px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.price{
    color:#22c55e;
    font-size:22px;
    font-weight:bold;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<header>🦖 متجر الداينوات</header>

<div class="container">

<div class="card">
<img src="giga.jpg">
<div class="info">
<h2>Giganotosaurus</h2>
<p>LvL 450</p>
<p class="price">50,000 Credit</p>
<button>شراء</button>
</div>
</div>

<div class="card">
<img src="shadowmane.jpg">
<div class="info">
<h2>Shadowmane</h2>
<p>LvL 450</p>
<p class="price">40,000 Credit</p>
<button>شراء</button>
</div>
</div>

<div class="card">
<img src="mana.jpg">
<div class="info">
<h2>Managarmr</h2>
<p>LvL 450</p>
<p class="price">35,000 Credit</p>
<button>شراء</button>
</div>
</div>

</div>

</body>
</html>
